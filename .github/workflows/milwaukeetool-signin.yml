name: milwaukeetool Auto Sign
on:
  schedule:
    - cron: '0 16,22,4,10 * * *'  # 你的定时规则，保留不变
  workflow_dispatch:  # 手动触发开关

jobs:
  sign:
    runs-on: ubuntu-latest  # 运行环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整仓库代码

      - name: Set Up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 匹配Python版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # 修复&&命令错误，单独执行

      - name: Run Sign Script
        env:
          # 环境变量名与Secrets、Python代码完全一致
          SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
          MILWAUKETOOL_CLIENT_ID: ${{ secrets.MILWAUKETOOL_CLIENT_ID }}
          MILWAUKETOOL_TOKEN_LIST: ${{ secrets.MILWAUKETOOL_TOKEN_LIST }}
          WEBHOOKURL: ${{ secrets.WEBHOOKURL }}
        run: python milwaukeetool-sign.py  # 执行脚本
