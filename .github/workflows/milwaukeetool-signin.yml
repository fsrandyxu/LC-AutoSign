name: milwaukeetool Auto Sign

on:
  schedule:
    - cron: '30 22,4,10 * * *'  # 仅修改这行：对应北京时间06:30、12:30、18:30
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai  # 仅新增时区配置（解决时间错位），未修改其他

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Sign Script
      env:
        # 完全还原你原有yml的环境变量名，未做任何修改
        SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
        SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        token: ${{ secrets.token }}
        client_id: ${{ secrets.client_id }}
        WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      run: |
        python milwaukeetool-sign.py  # 保持你原有的脚本调用命令
