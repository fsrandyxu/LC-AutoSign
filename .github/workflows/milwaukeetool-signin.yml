name: milwaukeetool Auto Sign

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'  # UTC → 北京时间 08:30/14:30/20:30/02:30
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    # ✅ 这是我检查后，唯一必须加的一行
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Sign
      env:
        SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
        SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        MILWAUKEETOOL_CLIENT_ID: ${{ secrets.MILWAUKEETOOL_CLIENT_ID }}
        MILWAUKEETOOL_TOKEN_LIST: ${{ secrets.MILWAUKEETOOL_TOKEN_LIST }}
        WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      run: |
        python milwaukeetool-sign.py
