name: milwaukeetool Auto Sign
on:
  schedule:
    - cron: '0 16,22,4,10 * * *'
  workflow_dispatch:
jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: python -m pip install --upgrade pip && pip install requests
    - name: Run Sign Script
      env:
        SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
        MILWAUKEETOOL_CLIENT_ID: ${{ secrets.MILWAUKEETOOL_CLIENT_ID }}
        MILWAUKEETOOL_TOKEN_LIST: ${{ secrets.MILWAUKEETOOL_TOKEN_LIST }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: python milwaukeetool-sign.py
