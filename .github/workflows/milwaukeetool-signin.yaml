name: milwaukeetool Auto Sign
on:
  schedule:
    - cron: '0 16,22,4,10 * * *'  # 你的6小时定时规则
  workflow_dispatch:  # 手动触发
jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    - name: Run Sign Script
      env:
        # 映射所有需要的环境变量（与GitHub Secrets匹配）
        SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
        MILWAUKEETOOL_CLIENT_ID: ${{ secrets.MILWAUKEETOOL_CLIENT_ID }}
        MILWAUKEETOOL_TOKEN_LIST: ${{ secrets.MILWAUKEETOOL_TOKEN_LIST }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: |
        python milwaukeetool-sign.py
